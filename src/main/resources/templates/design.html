<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org"
      xmlns="http://www.w3.org/1999/xhtml" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
      xsi:schemaLocation="http://www.thymeleaf.org " lang="RU">

<head>
    <title>Waflya</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
</head>

<body>
    <h1>Design your waflya!</h1>

    <img th:src="@{/images/waffle.png}" width="400" height="300" />

    <form method="POST" th:action="@{/design}" th:object="${waflya}">
        <div class="grid">

            <div class="ingredient-group" id="flour">
                <h3>Designate your flour:</h3>
                <div th:each="ingredient: ${flour}">
                    <label>
                        <input th:field="*{ingredients}" type="checkbox" th:value="${ingredient.id}"/>
                    </label>
                    <span th:text="${ingredient.name}">INGREDIENT</span>
                </div>
            </div>

            <div class="ingredient-group" id="wrap">
                <h3>Designate your wrap:</h3>
                <div th:each="ingredient: ${wrap}">
                    <label>
                        <input th:field="*{ingredients}" type="checkbox" th:value="${ingredient.id}"/>
                    </label>
                    <span th:text="${ingredient.name}">INGREDIENT</span>
                </div>
            </div>

            <div class="ingredient-group" id="filler">
                <h3>Designate your filler:</h3>
                <div th:each="ingredient: ${filler}">
                    <label>
                        <input th:field="*{ingredients}" type="checkbox" th:value="${ingredient.id}"/>
                    </label>
                    <span th:text="${ingredient.name}">INGREDIENT</span>
                </div>
            </div>

            <div class="ingredient-group" id="topping">
                <h3>Designate your topping:</h3>
                <div th:each="ingredient: ${topping}">
                    <label>
                        <input th:field="*{ingredients}" type="checkbox" th:value="${ingredient.id}"/>
                    </label>
                    <span th:text="${ingredient.name}">INGREDIENT</span>
                </div>
            </div>

        </div>

        <div>
            <h3>Name your waflya creation: </h3>
            <label>
                <input type="text" th:field="*{name}"/>
            </label>
            <br>

            <button>Submit your waflya</button>
        </div>
    </form>
</body>

</html>
